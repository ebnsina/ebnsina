<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#f6f7f2" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1a1d24" media="(prefers-color-scheme: dark)" />
		<!-- Heading font: Oddval. NOTE: loaded from cdnfonts (a re-hosting CDN).
		     Oddval is a commercial face — for production, license it and self-host
		     the woff2 (swap this <link> for a local @font-face in layout.css). -->
		<link rel="preconnect" href="https://fonts.cdnfonts.com" crossorigin />
		<link rel="stylesheet" href="https://fonts.cdnfonts.com/css/oddval" />
		<script>
			// FOUC guard: apply theme before first paint
			(() => {
				const s = localStorage.getItem('theme');
				const d = matchMedia('(prefers-color-scheme: dark)').matches;
				if (s === 'dark' || (!s && d)) document.documentElement.classList.add('dark');
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
